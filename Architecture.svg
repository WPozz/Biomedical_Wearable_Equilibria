
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" width="100%" height="100%" style="background-color: #f8f9fa; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  
  <rect x="50" y="50" width="800" height="550" rx="20" fill="#ffffff" stroke="#e2e8f0" stroke-width="3" />
  <text x="70" y="90" font-size="24" font-weight="bold" fill="#1e293b">App Architecture: Stress &amp; Muscle Monitor</text>
  
  <g transform="translate(100, 130)">
    <rect x="0" y="0" width="200" height="80" rx="10" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2" />
    <text x="100" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#0369a1">Wearable API</text>
    <text x="100" y="55" text-anchor="middle" font-size="12" fill="#0369a1">(Fitbit: HRV, Steps, Sleep)</text>
  </g>

  <g transform="translate(600, 130)">
    <rect x="0" y="0" width="200" height="80" rx="10" fill="#fef08a" stroke="#eab308" stroke-width="2" />
    <text x="100" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#854d0e">Background Services</text>
    <text x="100" y="55" text-anchor="middle" font-size="12" fill="#854d0e">(Local Notifications / Timers)</text>
  </g>

  <path d="M 200 210 L 200 250 L 450 250 L 450 270" fill="none" stroke="#94a3b8" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrow)" />
  <path d="M 700 210 L 700 250 L 450 250 L 450 270" fill="none" stroke="#94a3b8" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrow)" />

  <g transform="translate(250, 270)">
    <rect x="0" y="0" width="400" height="70" rx="15" fill="#f1f5f9" stroke="#64748b" stroke-width="2" />
    <text x="200" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#334155">State Management (Provider/Riverpod)</text>
    <text x="200" y="50" text-anchor="middle" font-size="14" fill="#475569">HealthDataProvider (Logic &amp; Calculations)</text>
  </g>

  <path d="M 450 340 L 450 380" fill="none" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)" />
  <path d="M 450 360 L 175 360 L 175 400" fill="none" stroke="#94a3b8" stroke-width="3" />
  <path d="M 450 360 L 350 360 L 350 400" fill="none" stroke="#94a3b8" stroke-width="3" />
  <path d="M 450 360 L 550 360 L 550 400" fill="none" stroke="#94a3b8" stroke-width="3" />
  <path d="M 450 360 L 725 360 L 725 400" fill="none" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)" />

  <g transform="translate(100, 400)">
    <rect x="0" y="0" width="150" height="120" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2" />
    <text x="75" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#166534">Tab 1: Home</text>
    <text x="75" y="60" text-anchor="middle" font-size="12" fill="#14532d">Stress Gauge</text>
    <text x="75" y="80" text-anchor="middle" font-size="12" fill="#14532d">Quick Metrics</text>
    <text x="75" y="100" text-anchor="middle" font-size="12" fill="#14532d">Muscle Alert Banner</text>
  </g>

  <g transform="translate(275, 400)">
    <rect x="0" y="0" width="150" height="120" rx="10" fill="#f3e8ff" stroke="#a855f7" stroke-width="2" />
    <text x="75" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#581c87">Tab 2: Analysis</text>
    <text x="75" y="60" text-anchor="middle" font-size="12" fill="#4c1d95">HRV Trends</text>
    <text x="75" y="80" text-anchor="middle" font-size="12" fill="#4c1d95">Context Logging</text>
    <text x="75" y="100" text-anchor="middle" font-size="12" fill="#4c1d95">Dept. Benchmark</text>
  </g>

  <g transform="translate(475, 400)">
    <rect x="0" y="0" width="150" height="120" rx="10" fill="#ffedd5" stroke="#f97316" stroke-width="2" />
    <text x="75" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#9a3412">Tab 3: Recovery</text>
    <text x="75" y="60" text-anchor="middle" font-size="12" fill="#7c2d12">Exercise Library</text>
    <text x="75" y="80" text-anchor="middle" font-size="12" fill="#7c2d12">Emotional Check-in</text>
    <text x="75" y="100" text-anchor="middle" font-size="12" fill="#7c2d12">Stretching Videos</text>
  </g>

  <g transform="translate(650, 400)">
    <rect x="0" y="0" width="150" height="120" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="2" />
    <text x="75" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#3730a3">Tab 4: Profile</text>
    <text x="75" y="60" text-anchor="middle" font-size="12" fill="#312e81">User Data</text>
    <text x="75" y="80" text-anchor="middle" font-size="12" fill="#312e81">Privacy Toggles</text>
    <text x="75" y="100" text-anchor="middle" font-size="12" fill="#312e81">Device Sync Status</text>
  </g>

  <rect x="100" y="540" width="700" height="40" rx="5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" />
  <text x="450" y="565" text-anchor="middle" font-size="14" font-weight="bold" fill="#64748b">IndexedStack &amp; BottomNavigationBar (UI Container)</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
    </marker>
  </defs>
</svg>
