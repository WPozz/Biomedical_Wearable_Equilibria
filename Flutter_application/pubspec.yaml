name: flutter_application
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  youtube_player_flutter: ^9.1.3
  youtube_player_iframe: ^5.2.2
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  fl_chart: ^0.70.2
  url_launcher: ^6.3.1
  provider: ^6.1.2
  flutter_localizations:   
    sdk: flutter                          
  shared_preferences_storage_view_driver: ^0.1.0-dev.5 
  http: ^1.2.1
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/


flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/Kairos_Logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/Kairos_Logo_foreground.png" 

