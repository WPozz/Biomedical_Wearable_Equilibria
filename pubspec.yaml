name: flutter_application_1
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  youtube_player_flutter: ^9.1.3
  youtube_player_iframe: ^5.2.2
  google_fonts: ^8.0.2
  fl_chart: ^0.70.2
  url_launcher: ^6.3.1
  http: ^1.2.1
  provider: ^6.1.2
  cupertino_icons: ^1.0.8
  shared_preferences_storage_view_driver: ^0.1.0-dev.5
